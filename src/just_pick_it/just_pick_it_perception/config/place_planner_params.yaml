shelf_place_planner_node:
  ros__parameters:
    robot_name: "jetcobot1"
    base_frame: "jetcobot1_base_link"

    # 카메라 intrinsics/distortion yaml (camera_calibrator.py 출력 포맷)
    camera_calibration_file: ""

    # hand-eye 외부파라미터 (camera->gripper). [x,y,z (m), rx,ry,rz (deg)]
    # 측정/캘리브레이션 결과로 채운다. euler order는 측정 convention에 맞춘다.
    hand_eye_xyzrpy: [0.0, 0.0, 0.05, 0.0, 0.0, 0.0]
    hand_eye_euler_order: "zyx"

    # status coords(rx,ry,rz)를 회전행렬로 바꿀 때의 euler convention.
    # 캘리브레이션 시 투영된 바닥점이 실제와 맞는지로 검증해 결정한다.
    coords_euler_order: "zyx"

    # 선반 dimension (m). W=앞 모서리 방향, L=깊이 방향, plane_z=base 기준 표면 높이
    shelf_width_m: 0.40
    shelf_depth_m: 0.20
    shelf_plane_z: 0.15
    # 앞 모서리 중앙 anchoring 보정(+면 e_x 방향으로 원점 이동). 선반이 로봇 정면 중앙이 아닐 때 사용.
    shelf_center_offset_m: 0.0

    # occupancy / 후보
    grid_res_m: 0.01
    place_object_radius_m: 0.03   # place할 물체 footprint 반경
    place_clearance_m: 0.01       # 인접 물체와 최소 여유
    edge_margin_m: 0.02           # 선반 가장자리 금지 margin

    # 가중치 (점수 최대화)
    w_dist: 1.0    # 팔 base에 가까울수록 (사용자 1순위)
    w_clear: 0.6   # 주변 여유 클수록
    w_edge: 0.3    # 가장자리에서 멀수록
    w_reach: 0.4   # 도달 적정 반경에 가까울수록

    # 팔 도달 반경 (base 원점 기준 xy 거리, m). 범위 밖 후보는 제외.
    reach_min_m: 0.10
    reach_max_m: 0.45

    # place pose orientation (top-down 기본). 그리퍼 장착에 맞춰 보정.
    place_roll_deg: 180.0
    place_pitch_deg: 0.0
    place_yaw_offset_deg: 0.0
    place_approach_height_m: 0.05

    # 선반 모서리 edge detection
    canny_low: 50
    canny_high: 150
    hough_threshold: 50
    hough_min_line_len: 40
    hough_max_line_gap: 10
    edge_roi_top_frac: 0.35
    edge_max_image_slope: 0.5
    use_white_mask: true
    capture_delay_sec: 0.4

    debug_px_per_m: 400.0
