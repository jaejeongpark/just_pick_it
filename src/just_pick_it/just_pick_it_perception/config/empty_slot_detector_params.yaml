empty_slot_detector_node:
  ros__parameters:
    # 점유로 처리할 YOLO 클래스(쉼표 구분). 비우면 모든 검출을 obstacle 취급.
    obstacle_classes: ""
    min_confidence: 0.3

    # 선반 표면 ROI fallback 사각형(이미지 비율). edge ROI 실패 시 사용.
    roi_top_frac: 0.30
    roi_bottom_frac: 0.98
    roi_left_frac: 0.05
    roi_right_frac: 0.95

    # Canny + Hough 로 선반 near-horizontal 모서리 검출해 ROI 상/하단을 한정.
    use_edge_roi: true
    canny_low: 50
    canny_high: 150
    hough_threshold: 50
    hough_min_line_len: 40
    hough_max_line_gap: 10
    edge_max_image_slope: 0.30
    use_white_mask: true

    # 후보 footprint / clearance / 가장자리 margin (이미지 픽셀).
    # 진열대 24x10cm 와 스캔 거리에 맞춰 실측 보정. 보수적으로(여유 크게) 잡는다.
    place_radius_px: 30.0
    clearance_px: 8.0
    edge_margin_px: 6.0

    # 스코어 가중치.
    w_clear: 1.0
    w_center: 0.6
    w_front: 0.5

    bbox_scale: 1.0
