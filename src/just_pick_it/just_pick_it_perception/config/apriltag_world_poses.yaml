# AprilTag 절대 월드 자세 DB
#
# 각 태그를 ID 키 아래에 등록한다. 새 태그를 시뮬레이션에 추가할 때마다
# 동일 스키마로 항목을 추가하면 추정기가 자동으로 사용한다.
#
# pose 단위: 위치는 미터, 회전(R,P,Y)은 라디안. 월드 프레임 기준.
# size_m: 태그 검은 사각형(텍스처)의 한 변 길이.

world_frame: map
family: tag36h11
default_size_m: 0.15

tags:
  0:
    size_m: 0.15
    pose: { x: 0.73, y: 0.0, z: 0.2, R: 0.0, P: 0.0, Y: 0.0 }
