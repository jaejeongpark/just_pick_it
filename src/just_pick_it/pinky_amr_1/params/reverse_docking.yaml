/**/reverse_docking:
  ros__parameters:

    # ------------------------------------------------------------------ #
    # ArUco 마커
    # ------------------------------------------------------------------ #
    aruco_marker_dict: "DICT_APRILTAG_36h11"   # 팀 perception 표준 (도크 마커)
    marker_size_m: 0.05           # 마커 실측 한 변 길이 (m)

    # 마커 월드 좌표 (marker_id 별 병렬 배열, map=zone 절대 프레임 좌하단 원점).
    # 가로벽(y≈0.655)에 도크를 바라보게(법선 -y) 부착. depth 정지/coarse 정렬에 사용.
    #   marker 0 -> CHARGING_DOCK_1 마커,  marker 1 -> CHARGING_DOCK_2 마커
    marker_ids: [0, 1]
    marker_world_x: [0.11, 0.28]
    marker_world_y: [0.635, 0.635]

    # ------------------------------------------------------------------ #
    # 카메라 — 비전팀 캘리브레이션 실측값 적용
    # PICKY1: just_pick_it_perception/result/camera_calibration.yaml (해상도 1280x720)
    # 주의: camera/image_raw 가 1280x720 으로 발행돼야 이 intrinsic 이 유효하다.
    # ------------------------------------------------------------------ #
    # 3x3 내부 파라미터를 행 우선(row-major) 9개 실수로 평탄화. DOUBLE_ARRAY 9개.
    camera_matrix: [985.2905146973088,               0.0, 639.6788580985803,
                                  0.0, 985.1639226270551, 356.3337085069538,
                                  0.0,               0.0,               1.0]
    dist_coeffs: [-0.009886920170813706, 0.04109867043833388, -0.0012477127326946092, 0.00016340382023196295, -0.053581046132224315]   # [k1, k2, p1, p2, k3]
    camera_topic: "camera/image_raw"
    # base_link 중심에서 카메라가 전방(+y_world)으로 떨어진 거리(URDF 근사). 깊이 정지 보정용.
    camera_forward_offset_m: 0.060   # robot(lidar)-marker 0.235 - camera-marker 0.175
    depth_scale: 1.38                # tz(깊이) fx 보정(실측 D/tz=1.48, 0.8cm 여유로 1.38). ↑면 더 일찍 정지. tx(횡)는 fx 무관이라 별도 스케일 없음
    # 후진 직전 odom 헤딩 미세보정(도). 단일마커 시절 좌잔차 fudge라 두-마커 헤딩에선
    # 의미 없고 오히려 이중보정 → 0. (값만 0, 로직은 무동작으로 남김)
    marker_yaw_offset_deg: 0.0

    # ------------------------------------------------------------------ #
    # 단계 A~C 공통: 탐색/측정/후진/재중심
    # ------------------------------------------------------------------ #
    acquire_rotate_speed: 0.3     # 마커 탐색 제자리 회전 (rad/s)
    arc_timeout_sec: 20.0         # 직진 후진/곡선 이동 timeout (s)
    measure_frames: 10            # 두-마커 pose 측정 평균 프레임수
    converged_reverse_m: 0.10     # 법선 정렬 후 두-마커 검출 영역 진입용 직진 후진량(m)
    # 후진 직전 법선 헤딩을 두-마커 yaw 로 정밀 정렬(단일 psi 노이즈 회피). 부호 의심되면 false.
    use_two_marker_normal: true
    two_marker_fx_scale: 1.48      # psi_two 의 tz 차에만 적용(실측 D/tz). 전역 depth 경로 무영향
    two_marker_max_turn_rad: 0.6   # partner 화각진입 최대 제자리 회전. 초과 시 단일 psi fallback
    two_marker_search_omega: 0.08  # partner 탐색 회전 속도(rad/s). 느리게 해 동시검출 구간 안 지나치게
    approach_y_m: 0.18             # 두-마커 후 곡선 이동 목표 깊이(월드 y). 여기서 dock_y 까지 직진 후진
    curve_pos_tol_m: 0.012         # 곡선 이동 도달 허용오차(m)
    curve_kv: 0.6                  # 곡선 후진 선속 게인(v=-kv·dist, reverse_speed 캡)
    curve_lat_gain: 0.9            # 곡선 횡(델타x) 이동 배율. 약간 서쪽으로 지나쳐 멈추면 줄임(0.10~0.105→0.11)
    two_marker_retry_reverse_m: 0.02  # 두-마커 검출 실패 시 법선복귀 후 추가 후진(가까우면 partner 화각밖)
    two_marker_max_retries: 5      # 두-마커 검출 추가후진 재시도 최대 횟수
    # 최종 yaw 정렬 허용오차(rad). 후진 중 odom 헤딩유지 게인.
    yaw_align_tol_rad: 0.04
    yaw_hold_kp: 1.0
    # 마커 상실/재정렬 시 제자리 회전 재중심. kp=중심 정렬 게인, tol=중앙 허용 bearing(rad).
    recenter_kp: 0.8
    recenter_tol_rad: 0.05
    recenter_timeout_sec: 6.0

    # ------------------------------------------------------------------ #
    # 후진 / 정지
    # ------------------------------------------------------------------ #
    reverse_speed: 0.04           # 후진 속도 (m/s)
    stop_y_tolerance_m: 0.01      # dock_y 도달 허용오차 (m)
    settle_sec: 0.5               # 정지 후 안정화 대기 (s)

    # ------------------------------------------------------------------ #
    # 공통
    # ------------------------------------------------------------------ #
    max_angular_vel: 0.25         # angular.z 상한 (rad/s) — 큰 각 스윙 캡으로 진동 완화
    acquire_timeout_sec: 30.0     # 마커 획득 최대 대기 (s)
    insert_timeout_sec: 40.0      # 후진 삽입 최대 시간 (s)
