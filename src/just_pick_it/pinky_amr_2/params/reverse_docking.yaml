/**/reverse_docking:
  ros__parameters:

    # ------------------------------------------------------------------ #
    # Marker
    # ------------------------------------------------------------------ #
    # PICKY1과 같은 담당자 출력물 기준. 마커 ID는 패턴에 들어 있고,
    # 실제 map 좌표/도크 좌표는 state_machine/reverse_docking 설정이 해석한다.
    aruco_marker_dict: "DICT_APRILTAG_36h11"
    marker_size_m: 0.05

    # ------------------------------------------------------------------ #
    # Camera
    # ------------------------------------------------------------------ #
    # 평소 주행 중에는 카메라를 끄고, DOCK_IN 중 reverse_docking이 Picamera2를
    # 직접 열었다가 끝나면 닫는다. 외부 camera/image_raw 노드로 테스트할 때만
    # camera_source를 ros_topic으로 바꾼다.
    camera_source: "picamera2"
    camera_topic: "camera/image_raw"
    camera_width: 1280
    camera_height: 720
    flip_camera_180: false

    # PICKY2: just_pick_it_perception/result/picky_2/camera_calibration.yaml
    # 해상도 1280x720 기준 intrinsic.
    camera_matrix: [1564.8861778174316,                0.0, 634.6279547011992,
                                   0.0, 1557.9751956153086, 386.3538829840184,
                                   0.0,                0.0,               1.0]
    dist_coeffs: [-0.03862007925270209, 1.9953590527035414, -0.004035341465584413, 0.007809686398255311, -10.752768150812287]

    # ------------------------------------------------------------------ #
    # Phase timing
    # ------------------------------------------------------------------ #
    marker_timeout_sec: 15.0
    align_timeout_sec: 10.0
    reverse_timeout_sec: 20.0
    odom_timeout_sec: 5.0
    settle_sec: 0.3

    # ------------------------------------------------------------------ #
    # Marker alignment
    # ------------------------------------------------------------------ #
    acquire_rotate_speed: 0.25
    align_lateral_tolerance_m: 0.02
    align_stable_frames: 3
    align_kp: 1.2
    max_angular_vel: 0.35

    # ------------------------------------------------------------------ #
    # Reverse insertion
    # ------------------------------------------------------------------ #
    # STANDBY_ZONE_2 y=0.40 -> CHARGING_DOCK_2 y=0.08 기준 약 0.32m.
    # 첫 버전은 odom yaw hold만 사용하고, lateral drift가 로그로 확인되면
    # reverse_marker_lat_kp를 0보다 크게 올려 마커 tvec[0] 보정을 추가한다.
    reverse_speed: 0.035
    reverse_distance_m: 0.32
    yaw_hold_kp: 1.2
    reverse_marker_lat_kp: 0.0
